<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReAct Agent 流程图预览</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        background: #f7f8fa;
        color: #1f2937;
      }
      .card {
        max-width: 1400px;
        margin: 0 auto;
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      h2 {
        margin: 0 0 16px;
      }
      .canvas {
        overflow: auto;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: #fcfcfd;
      }
      .tip {
        margin-top: 12px;
        color: #6b7280;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>ReAct Agent 流程图</h2>
      <div class="canvas">
        <svg width="1360" height="980" viewBox="0 0 1360 980" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
              <path d="M0,0 L10,3 L0,6 Z" fill="#6b7280"></path>
            </marker>
          </defs>

          <rect x="40" y="30" width="200" height="52" rx="8" fill="#eef2ff" stroke="#6366f1"></rect>
          <text x="140" y="62" text-anchor="middle" font-size="14">用户请求 /api/aiAgent/ask</text>
          <line x1="140" y1="82" x2="140" y2="120" stroke="#6b7280" marker-end="url(#arrow)"></line>

          <rect x="40" y="120" width="200" height="52" rx="8" fill="#eef2ff" stroke="#6366f1"></rect>
          <text x="140" y="152" text-anchor="middle" font-size="14">app.js 创建 SSE 流</text>
          <line x1="140" y1="172" x2="140" y2="210" stroke="#6b7280" marker-end="url(#arrow)"></line>

          <rect x="40" y="210" width="200" height="52" rx="8" fill="#eef2ff" stroke="#6366f1"></rect>
          <text x="140" y="242" text-anchor="middle" font-size="14">processQuery</text>

          <polygon points="140,300 220,355 140,410 60,355" fill="#fff7ed" stroke="#f59e0b"></polygon>
          <text x="140" y="352" text-anchor="middle" font-size="13">LLM 可用?</text>
          <text x="140" y="372" text-anchor="middle" font-size="12">ENABLE_OPENAI & API_KEY</text>
          <line x1="140" y1="262" x2="140" y2="300" stroke="#6b7280" marker-end="url(#arrow)"></line>

          <rect x="40" y="470" width="200" height="52" rx="8" fill="#ecfeff" stroke="#0891b2"></rect>
          <text x="140" y="502" text-anchor="middle" font-size="14">runLocalMode</text>
          <line x1="140" y1="410" x2="140" y2="470" stroke="#6b7280" marker-end="url(#arrow)"></line>
          <text x="112" y="447" font-size="12" fill="#6b7280">否</text>

          <rect x="40" y="560" width="200" height="52" rx="8" fill="#ecfeff" stroke="#0891b2"></rect>
          <text x="140" y="592" text-anchor="middle" font-size="14">调用单个 MCP 工具</text>
          <line x1="140" y1="522" x2="140" y2="560" stroke="#6b7280" marker-end="url(#arrow)"></line>

          <rect x="40" y="650" width="200" height="52" rx="8" fill="#ecfeff" stroke="#0891b2"></rect>
          <text x="140" y="682" text-anchor="middle" font-size="14">格式化文本</text>
          <line x1="140" y1="612" x2="140" y2="650" stroke="#6b7280" marker-end="url(#arrow)"></line>

          <polygon points="680,300 760,355 680,410 600,355" fill="#fff7ed" stroke="#f59e0b"></polygon>
          <text x="680" y="352" text-anchor="middle" font-size="13">thinkingMode</text>
          <line x1="220" y1="355" x2="600" y2="355" stroke="#6b7280" marker-end="url(#arrow)"></line>
          <text x="410" y="346" font-size="12" fill="#6b7280">是</text>

          <line x1="640" y1="410" x2="200" y2="470" stroke="#6b7280" marker-end="url(#arrow)"></line>
          <text x="400" y="454" font-size="12" fill="#6b7280">local</text>

          <rect x="900" y="330" width="220" height="52" rx="8" fill="#f3e8ff" stroke="#7c3aed"></rect>
          <text x="1010" y="362" text-anchor="middle" font-size="14">runReActMode</text>
          <line x1="760" y1="355" x2="900" y2="355" stroke="#6b7280" marker-end="url(#arrow)"></line>
          <text x="830" y="346" font-size="12" fill="#6b7280">react</text>

          <rect x="900" y="420" width="220" height="52" rx="8" fill="#f3e8ff" stroke="#7c3aed"></rect>
          <text x="1010" y="452" text-anchor="middle" font-size="13">加载 tools + 首轮 responses.create</text>
          <line x1="1010" y1="382" x2="1010" y2="420" stroke="#6b7280" marker-end="url(#arrow)"></line>

          <polygon points="1010,520 1110,580 1010,640 910,580" fill="#fff7ed" stroke="#f59e0b"></polygon>
          <text x="1010" y="577" text-anchor="middle" font-size="13">有 function_call?</text>
          <line x1="1010" y1="472" x2="1010" y2="520" stroke="#6b7280" marker-end="url(#arrow)"></line>

          <rect x="840" y="700" width="340" height="52" rx="8" fill="#f3e8ff" stroke="#7c3aed"></rect>
          <text x="1010" y="732" text-anchor="middle" font-size="13">遍历 function_call → 校验白名单 → callTool → 回填 output</text>
          <line x1="1010" y1="640" x2="1010" y2="700" stroke="#6b7280" marker-end="url(#arrow)"></line>
          <text x="1030" y="675" font-size="12" fill="#6b7280">是</text>

          <line x1="1180" y1="726" x2="1260" y2="726" stroke="#6b7280"></line>
          <line x1="1260" y1="726" x2="1260" y2="580" stroke="#6b7280"></line>
          <line x1="1260" y1="580" x2="1110" y2="580" stroke="#6b7280" marker-end="url(#arrow)"></line>

          <rect x="900" y="790" width="220" height="52" rx="8" fill="#f3e8ff" stroke="#7c3aed"></rect>
          <text x="1010" y="822" text-anchor="middle" font-size="14">读取 output_text</text>
          <line x1="1010" y1="640" x2="1010" y2="790" stroke="#6b7280" marker-end="url(#arrow)"></line>
          <text x="1030" y="768" font-size="12" fill="#6b7280">否</text>

          <rect x="380" y="840" width="220" height="52" rx="8" fill="#dcfce7" stroke="#16a34a"></rect>
          <text x="490" y="872" text-anchor="middle" font-size="14">SSE 分块输出</text>

          <rect x="380" y="920" width="220" height="42" rx="8" fill="#dcfce7" stroke="#16a34a"></rect>
          <text x="490" y="946" text-anchor="middle" font-size="13">写入 [DONE] 并结束</text>

          <line x1="140" y1="702" x2="420" y2="840" stroke="#6b7280" marker-end="url(#arrow)"></line>
          <line x1="1010" y1="842" x2="600" y2="860" stroke="#6b7280" marker-end="url(#arrow)"></line>
          <line x1="490" y1="892" x2="490" y2="920" stroke="#6b7280" marker-end="url(#arrow)"></line>
        </svg>
      </div>
      <div class="tip">如果你希望，我可以再给你一个完全等价的 Mermaid 版本（用于文档），以及 draw.io 可编辑版结构。</div>
    </div>
  </body>
</html>
